trigger:
- main
pool:
  vmImage: ubuntu-latest
steps:
- checkout: self
- task: UsePythonVersion@0
  inputs:
      versionSpec: '3.x'
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install dependencies
- script: |
    docker build -t iris-app .
  displayName: Build Docker Image